  # Hero Section Configuration
  [params.hero]
    badge = "Software Engineer"
    title = "Hi, I'm Shubham Rawat."
    summary = "I’m a Software Engineer with over 3 years of experience building scalable, cloud-native applications and integrating Generative AI into real-world systems. I specialize in backend development using Ruby on Rails and Python, with hands-on experience in Docker, AWS cloud."
    # avatar = "images/avatar.png"  # Optional: 400x400px recommended
    location = "Bangalore, India"
    focus = "Software Development Engineer | APIs | Databases | Gen-AI"
    availableLabel = "Available for work"

    nowLabel = "Quick Facts"
    nowIntro = "Right now I'm mainly:"
    now = [
      "Building minimal Hugo themes",
      "Exploring dark-mode design patterns",
      "Writing about web performance"
    ]

    [params.hero.primary]
      label = "Read the Blog"
      href = "/blog/"

    [params.hero.secondary]
      label = "Check Notes"
      href = "/notes/"
